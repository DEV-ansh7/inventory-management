server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity
jwt.expiration=86400000

# Mail (Gmail SMTP — replace with your credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin email for alerts
app.admin.email=admin@yourcompany.com

# Razorpay UPI (replace with your keys)
razorpay.key.id=rzp_test_xxxxxxxxxxxx
razorpay.key.secret=xxxxxxxxxxxxxxxxxxxxxxxx

# Low stock default threshold
app.stock.low-threshold=10

# Payment alert days before due date
app.payment.alert-days=3
