server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nobroker}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity}
jwt.expiration=86400000

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin email for alerts
app.admin.email=${ADMIN_EMAIL:admin@yourcompany.com}

# Razorpay UPI
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_xxxxxxxxxxxx}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:xxxxxxxxxxxxxxxxxxxxxxxx}

# Low stock default threshold
app.stock.low-threshold=10

# Payment alert days before due date
app.payment.alert-days=3
